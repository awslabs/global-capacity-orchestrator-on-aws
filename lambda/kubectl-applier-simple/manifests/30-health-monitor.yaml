# Health Monitor — monitors cluster resource utilization and exposes /api/v1/health
# Deployment + PodDisruptionBudget + Service consolidated in one file.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-monitor
  namespace: gco-system
  labels:
    app: health-monitor
    component: api
    project: gco
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: health-monitor
  template:
    metadata:
      labels:
        app: health-monitor
        component: api
        project: gco
      annotations:
        gco.aws/deployment-timestamp: "{{DEPLOYMENT_TIMESTAMP}}"
    spec:
      serviceAccountName: gco-health-monitor-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: health-monitor
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: health-monitor
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: health-monitor
                topologyKey: kubernetes.io/hostname
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: health-monitor
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: health-monitor
          image: {{HEALTH_MONITOR_IMAGE}}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CLUSTER_NAME
              value: "{{CLUSTER_NAME}}"
            - name: REGION
              value: "{{REGION}}"
            - name: AUTH_SECRET_ARN
              value: "{{AUTH_SECRET_ARN}}"
            - name: DYNAMODB_REGION
              value: "{{DYNAMODB_REGION}}"
            - name: AWS_ROLE_ARN
              value: "{{SERVICE_ACCOUNT_ROLE_ARN}}"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
            - name: CPU_THRESHOLD
              value: "{{CPU_THRESHOLD}}"
            - name: MEMORY_THRESHOLD
              value: "{{MEMORY_THRESHOLD}}"
            - name: GPU_THRESHOLD
              value: "{{GPU_THRESHOLD}}"
            - name: PENDING_PODS_THRESHOLD
              value: "{{PENDING_PODS_THRESHOLD}}"
            - name: PENDING_REQUESTED_CPU_VCPUS
              value: "{{PENDING_REQUESTED_CPU_VCPUS}}"
            - name: PENDING_REQUESTED_MEMORY_GB
              value: "{{PENDING_REQUESTED_MEMORY_GB}}"
            - name: PENDING_REQUESTED_GPUS
              value: "{{PENDING_REQUESTED_GPUS}}"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: aws-iam-token
              mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              readOnly: true
      volumes:
        - name: aws-iam-token
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  audience: sts.amazonaws.com
                  expirationSeconds: 86400
                  path: token
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: health-monitor-pdb
  namespace: gco-system
  labels:
    app: health-monitor
    project: gco
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: health-monitor
---
apiVersion: v1
kind: Service
metadata:
  name: health-monitor
  namespace: gco-system
  labels:
    app: health-monitor
    project: gco
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: health-monitor
