# GCO Jobs ServiceAccount — dedicated SA for user job pods
# automountServiceAccountToken is disabled to prevent user job pods from
# accessing the Kubernetes API via an auto-mounted service account token.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gco-service-account
  namespace: gco-jobs
  labels:
    app: gco
    project: gco
  annotations:
    eks.amazonaws.com/role-arn: "{{SERVICE_ACCOUNT_ROLE_ARN}}"
automountServiceAccountToken: false
