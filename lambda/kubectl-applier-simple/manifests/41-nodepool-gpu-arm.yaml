# GPU NodePool — ARM64 (g5g with Graviton + A10G GPUs)
# Lower cost than x86 GPU instances for compatible workloads.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-arm-pool
spec:
  template:
    metadata:
      labels:
        workload-type: gpu
        arch: arm64
        project: gco
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: "eks.amazonaws.com/instance-family"
          operator: In
          values: ["g5g"]
        - key: "kubernetes.io/arch"
          operator: In
          values: ["arm64"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "eks.amazonaws.com/instance-gpu-manufacturer"
          operator: In
          values: ["nvidia"]
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
  limits:
    cpu: "500"
    memory: 2000Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
    budgets:
      - nodes: "10%"
