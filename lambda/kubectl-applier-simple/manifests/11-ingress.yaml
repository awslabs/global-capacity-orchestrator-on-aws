# GCO Ingress — routes external traffic to health-monitor and manifest-processor
# EKS Auto Mode creates and manages the ALB automatically when this Ingress is applied.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gco-ingress
  namespace: gco-system
  labels:
    app: gco
    project: gco
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api/v1/health
            pathType: Prefix
            backend:
              service:
                name: health-monitor
                port:
                  number: 80
          - path: /api/v1/manifests
            pathType: Prefix
            backend:
              service:
                name: manifest-processor
                port:
                  number: 80
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: health-monitor
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: manifest-processor
                port:
                  number: 80
