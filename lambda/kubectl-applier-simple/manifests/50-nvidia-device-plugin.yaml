# NVIDIA Device Plugin DaemonSet
# Advertises GPU resources to the Kubernetes scheduler on NVIDIA GPU nodes.
# EKS Auto Mode includes GPU support by default; this provides additional
# configuration and ensures the plugin is present on all GPU nodes.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    app: nvidia-device-plugin
  annotations:
    # Checkov suppressions — third-party NVIDIA device plugin requirements
    checkov.io/skip1: CKV_K8S_8=Device plugin uses gRPC socket, not HTTP
    checkov.io/skip2: CKV_K8S_9=Device plugin uses gRPC socket, not HTTP
    checkov.io/skip3: CKV_K8S_10=CPU requests vary by node, minimal usage
    checkov.io/skip4: CKV_K8S_11=CPU limits could cause GPU detection failures
    checkov.io/skip5: CKV_K8S_12=Memory requests vary by node, minimal usage
    checkov.io/skip6: CKV_K8S_13=Memory limits could cause GPU detection failures
    checkov.io/skip7: CKV_K8S_14=Using specific version tag v0.19.0
    checkov.io/skip8: CKV_K8S_15=Always pull would fail in air-gapped environments
    checkov.io/skip9: CKV_K8S_43=Version tag preferred over digest for maintainability
    checkov.io/skip10: CKV_K8S_22=Plugin needs write access to device-plugins dir
    checkov.io/skip11: CKV_K8S_23=Root required for GPU device access in /dev
    checkov.io/skip12: CKV_K8S_28=False positive - all capabilities already dropped
    checkov.io/skip13: CKV_K8S_29=Container-level securityContext is sufficient
    checkov.io/skip14: CKV_K8S_30=Container securityContext already configured
    checkov.io/skip15: CKV_K8S_31=Seccomp would break GPU device access
    checkov.io/skip16: CKV_K8S_38=Plugin does not need K8s API access
    checkov.io/skip17: CKV_K8S_40=Root UID required for /dev GPU device access
    checkov.io/skip18: CKV2_K8S_6=DaemonSet in kube-system communicates only with local kubelet via hostPath
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        eks.amazonaws.com/instance-gpu-manufacturer: nvidia
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.19.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
