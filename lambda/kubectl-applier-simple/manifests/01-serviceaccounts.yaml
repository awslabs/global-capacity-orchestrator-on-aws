# GCO Service Accounts — per-namespace accounts for user workloads
# The IAM role ARN is injected at deploy time from the CDK stack output.
# Pod Identity associations are also created in CDK as a secondary credential path.
#
# Platform service SAs (gco-health-monitor-sa, gco-manifest-processor-sa,
# gco-inference-monitor-sa) are defined in 02-rbac.yaml alongside their roles.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gco-service-account
  namespace: gco-jobs
  labels:
    app: gco
    project: gco
  annotations:
    eks.amazonaws.com/role-arn: "{{SERVICE_ACCOUNT_ROLE_ARN}}"
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gco-service-account
  namespace: gco-inference
  labels:
    app: gco
    project: gco
  annotations:
    eks.amazonaws.com/role-arn: "{{SERVICE_ACCOUNT_ROLE_ARN}}"
