# GPU Time-Slicing Example
#
# This example shows how to run a job using a fractional (shared) GPU via
# NVIDIA GPU time-slicing. Time-slicing lets multiple pods share a single
# physical GPU by taking turns, similar to how a CPU handles multiple processes.
#
# PREREQUISITES:
#   Time-slicing must be enabled on the cluster. Apply the ConfigMap below
#   to configure the NVIDIA device plugin to advertise multiple "replicas"
#   per physical GPU. Each replica represents a time-slice that a pod can
#   request. For example, replicas=4 means one physical GPU is exposed as
#   4 schedulable nvidia.com/gpu units.
#
#   1. Apply the time-slicing ConfigMap:
#
#      kubectl apply -f - <<'EOF'
#      apiVersion: v1
#      kind: ConfigMap
#      metadata:
#        name: nvidia-device-plugin-config
#        namespace: kube-system
#      data:
#        config.yaml: |
#          version: v1
#          sharing:
#            timeSlicing:
#              renameByDefault: false
#              resources:
#                - name: nvidia.com/gpu
#                  replicas: 4
#      EOF
#
#   2. Restart the NVIDIA device plugin to pick up the config:
#
#      kubectl rollout restart daemonset/nvidia-device-plugin-daemonset -n kube-system
#
#   After this, each physical GPU advertises 4 nvidia.com/gpu units.
#   A pod requesting nvidia.com/gpu: 1 gets a 1/4 time-slice of a GPU.
#
# NOTES:
#   - Time-sliced workloads share GPU memory. There is no memory isolation,
#     so a job that allocates too much VRAM can cause OOM errors for others.
#   - Works on any NVIDIA GPU (g4dn, g5, p3, p4d, p5, etc.).
#   - Karpenter does not currently account for time-slicing replicas when
#     provisioning nodes (see github.com/kubernetes-sigs/karpenter/issues/2140).
#     It may over-provision initially, but the kube-scheduler will bin-pack
#     pods onto the replicated GPU slots once the node is ready.
#   - Good for inference, lightweight training, and dev/test workloads.

---
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-timeslice-job
  namespace: gco-jobs
  labels:
    app: gpu-timeslice-example
    gpu-sharing: timeslicing
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: gpu-workload
        image: nvidia/cuda:12.6.3-base-ubuntu24.04
        command:
        - sh
        - -c
        - |
          echo "=== GPU Time-Slice Job ==="
          echo "This pod is using a fractional GPU via time-slicing."
          echo ""
          nvidia-smi
          echo ""
          echo "Note: nvidia-smi shows the full physical GPU, but this pod"
          echo "is sharing it with other time-sliced workloads."
          echo ""
          echo "GPU time-slice job completed successfully."
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
            # Request 1 time-slice (e.g., 1/4 of a GPU if replicas=4)
            nvidia.com/gpu: 1
          limits:
            cpu: "500m"
            memory: "1Gi"
            nvidia.com/gpu: 1
      restartPolicy: Never
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      nodeSelector:
        eks.amazonaws.com/instance-gpu-manufacturer: nvidia
  backoffLimit: 3
