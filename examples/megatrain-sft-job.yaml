# MegaTrain SFT Training Job
# Fine-tunes Qwen2.5-1.5B on the built-in alpaca demo dataset using MegaTrain.
# MegaTrain stores parameters in CPU RAM and streams one layer at a time to the
# GPU, enabling training of models larger than GPU memory on a single device.
#
# How it works:
#   1. Init container downloads model weights to shared EFS (skipped if cached)
#   2. Main container clones MegaTrain, installs it with CUDA extensions,
#      then runs examples/sft/train.py against the downloaded model
#
# Notes from testing:
#   - The devel image is required (not runtime) because MegaTrain builds a
#     CUDA extension at install time
#   - The trainer runs as root because conda's site-packages aren't writable
#     as non-root in the PyTorch devel image
#   - flash_attention_2 is installed at runtime and requires Ampere+ GPUs
#     (i.e. A10G, L4, A100, H100, etc.) — T4/Turing GPUs are not supported
#   - For larger models (7B+), increase memory requests and ensure the GPU
#     nodepool includes instances with enough RAM (e.g., g5.12xlarge for 7B)
#
# ⚠️ Resource quota:
#   This example REQUIRES raising the shipped per-manifest caps before
#   submission. MegaTrain holds the full model in CPU RAM and materializes
#   optimizer state lazily, so it needs more memory than the default 32Gi
#   cap allows. Submission will fail with:
#
#     "Memory <N>Gi exceeds max 32Gi"
#
#   To raise the caps, edit the shared policy in cdk.json and redeploy
#   (both the REST manifest processor and the SQS queue processor read
#   from the same section):
#
#     context.job_validation_policy.resource_quotas.max_memory_per_manifest: "64Gi"
#     context.job_validation_policy.resource_quotas.max_cpu_per_manifest:    "16"
#
#   The quota is summed across init + main containers, so a manifest with
#   a 2Gi init + 48Gi trainer needs at least a 50Gi per-manifest cap.
#
# Why 48Gi:
#   MegaTrain holds the full model in CPU RAM and materializes optimizer
#   state lazily on the first backward pass. Observed peaks during the 5-step
#   Qwen2.5-1.5B demo are ~19GB mid-step-1 but climb further between steps
#   as optimizer state fully allocates. 28Gi was not enough in practice
#   (OOMKilled between step 1 and step 2). 48Gi leaves comfortable headroom.
#   Scale this up for larger models.
#
# Prerequisites:
#   - A GPU node with enough CPU RAM for the model (~20GB for 1.5B)
#   - Shared storage (EFS) mounted via gco-shared-storage PVC
#
# Usage:
#   gco jobs submit-direct examples/megatrain-sft-job.yaml -r us-east-1
#   gco jobs logs megatrain-sft -r us-east-1 -f
#
# To train a different model, change MODEL_NAME in both the init container
# and main container env vars.
#
# Reference: https://github.com/DLYuanGod/MegaTrain

apiVersion: batch/v1
kind: Job
metadata:
  name: megatrain-sft
  namespace: gco-jobs
  labels:
    app: megatrain-sft
    framework: megatrain
    project: gco
spec:
  template:
    metadata:
      labels:
        app: megatrain-sft
        framework: megatrain
      annotations:
        karpenter.sh/do-not-disrupt: "true"
    spec:
      # Init container runs as non-root; trainer needs root for conda pip
      securityContext:
        fsGroup: 1000
      # ── Init container: download model weights to EFS if not cached ──
      initContainers:
      - name: model-downloader
        image: python:3.14-slim
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        command:
        - python
        - -c
        - |
          import subprocess, sys, os

          model_id = os.environ["MODEL_NAME"]
          model_short = model_id.split("/")[-1]
          local_dir = f"/mnt/gco/models/{model_short}"

          # Check if model is already downloaded
          config_path = os.path.join(local_dir, "config.json")
          if os.path.exists(config_path):
              print(f"Model already cached at {local_dir}, skipping download")
              sys.exit(0)

          print(f"Downloading {model_id} to {local_dir}...")
          subprocess.check_call([
              sys.executable, "-m", "pip", "install",
              "--target", "/tmp/pylib", "huggingface_hub==1.11.0", "-q"
          ])
          sys.path.insert(0, "/tmp/pylib")
          from huggingface_hub import snapshot_download

          snapshot_download(
              repo_id=model_id,
              local_dir=local_dir,
              ignore_patterns=["*.gguf", "*.ggml"],
          )
          print(f"Download complete: {local_dir}")

          for root, dirs, files in os.walk(local_dir):
              for f in files:
                  path = os.path.join(root, f)
                  size_mb = os.path.getsize(path) / (1024 * 1024)
                  print(f"  {os.path.relpath(path, local_dir)} ({size_mb:.1f} MB)")
        env:
        - name: MODEL_NAME
          value: "Qwen/Qwen2.5-1.5B"
        - name: HF_HOME
          value: "/tmp/hf_cache"
        - name: PIP_CACHE_DIR
          value: "/tmp/pip_cache"
        # Uncomment for gated models (Llama, Mistral, etc.)
        # - name: HF_TOKEN
        #   value: "hf_your_token_here"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
        volumeMounts:
        - name: shared-storage
          mountPath: /mnt/gco
      # ── Main container: MegaTrain SFT training ──
      # Runs as root (image default) so pip installs into conda site-packages
      containers:
      - name: trainer
        image: pytorch/pytorch:2.6.0-cuda12.6-cudnn9-devel
        command:
        - bash
        - -c
        - |
          set -e

          # Derive model local path from MODEL_NAME
          MODEL_SHORT=$(echo "${MODEL_NAME}" | awk -F/ '{print $NF}')
          MODEL_PATH="/mnt/gco/models/${MODEL_SHORT}"

          echo "=== MegaTrain SFT Training ==="
          echo "Model: ${MODEL_NAME}"
          echo "Local path: ${MODEL_PATH}"
          echo "GPU: $(nvidia-smi --query-gpu=name --format=csv,noheader 2>/dev/null || echo 'detecting...')"

          # Install git and clone MegaTrain at a pinned commit for
          # reproducibility (HEAD at time of example authoring).
          conda install -y -q -c conda-forge git=2.51.0 > /dev/null 2>&1
          git clone https://github.com/DLYuanGod/MegaTrain.git /tmp/megatrain
          git -C /tmp/megatrain checkout 919520f07182c0d4d3e9765b2f915702e71c11a4

          # Install MegaTrain in-place (builds CUDA extension with the image's torch)
          pip install -q -e /tmp/megatrain
          pip install -q \
            accelerate==1.13.0 \
            transformers==5.5.4 \
            flash-attn==2.8.3 \
            --no-build-isolation

          # Verify the infinity package is importable
          python -c "from infinity import CPUMasterModel; print('MegaTrain (infinity) loaded successfully')"

          # Write training config
          cat > /tmp/config.yaml << EOF
          model:
            name: "${MODEL_NAME}"
            dtype: "bfloat16"
            attn_implementation: "flash_attention_2"

          dataset:
            name: "alpaca_en_demo"
            dataset_dir: "/tmp/megatrain/data"
            max_seq_len: 1024

          training:
            batch_size: ${BATCH_SIZE}
            num_steps: ${NUM_STEPS}
            learning_rate: 1.0e-5
            output_dir: "${OUTPUT_DIR}"

          optimizer:
            type: "deepspeed_adam"
          EOF

          echo "=== Training config ==="
          cat /tmp/config.yaml
          echo "======================="

          # Run training using MegaTrain's own entry point
          cd /tmp/megatrain
          python examples/sft/train.py \
            --config /tmp/config.yaml \
            --model-name "${MODEL_NAME}"

          echo "=== Training complete ==="
          echo "Checkpoints saved to ${OUTPUT_DIR}"
          ls -lh ${OUTPUT_DIR}/ 2>/dev/null || echo "No output directory found"
        env:
        # Model configuration — change this to train a different model
        - name: MODEL_NAME
          value: "Qwen/Qwen2.5-1.5B"
        # Training hyperparameters
        # IMPORTANT: Use MegaTrain's calc_resource.py to find optimal batch size
        # for your hardware. Wrong batch size causes OOM or wastes GPU utilization.
        - name: BATCH_SIZE
          value: "64"
        - name: NUM_STEPS
          value: "5"
        # Output directory for checkpoints
        - name: OUTPUT_DIR
          value: "/mnt/gco/megatrain-sft/checkpoints"
        - name: HF_HOME
          value: "/tmp/hf_cache"
        # Uncomment for gated models (Llama, Mistral, etc.)
        # - name: HF_TOKEN
        #   value: "hf_your_token_here"
        resources:
          requests:
            cpu: "4"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "48Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: shared-storage
          mountPath: /mnt/gco
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: gco-shared-storage
      # Large shared memory for PyTorch data loading
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      restartPolicy: Never
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      # Flash attention requires Ampere+ GPUs (A10G, L4, A100, H100).
      # Exclude g4dn (T4/Turing) by selecting only g5/g6/p4d/p5 families.
      nodeSelector:
        eks.amazonaws.com/instance-gpu-manufacturer: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: eks.amazonaws.com/instance-family
                operator: In
                values: ["g5", "g6", "g6e", "p4d", "p5"]
  backoffLimit: 2
