# Cluster Shared Bucket Upload Job Example
#
# Writes a small JSON artifact to the always-on Cluster_Shared_Bucket using
# envFrom against the gco-cluster-shared-bucket ConfigMap. The bucket's
# name, ARN, and region are exposed as env vars (sharedBucketName,
# sharedBucketArn, sharedBucketRegion) — no hardcoded bucket names. Works
# regardless of whether the analytics environment is enabled.
#
# Prerequisites:
#   - None — Cluster_Shared_Bucket is always provisioned with
#     `gco stacks deploy gco-global`.
#
# Usage:
#   gco jobs submit-direct examples/cluster-shared-bucket-upload-job.yaml -r us-east-1
#
# Notes:
#   - Cross-region caveat: the shared bucket lives in the global region
#     (default us-east-2) where GCOGlobalStack is deployed, not in the
#     regional cluster's own region. The boto3 client below is pointed at
#     os.environ["sharedBucketRegion"] so requests go to the bucket's home
#     region. Expect small cross-region egress charges on large uploads.
#
# Docs: ../docs/CLUSTER_SHARED_BUCKET.md
apiVersion: batch/v1
kind: Job
metadata:
  name: cluster-shared-bucket-upload
  namespace: gco-jobs
  labels:
    app: cluster-shared-bucket-upload
    project: gco
spec:
  template:
    spec:
      serviceAccountName: gco-service-account
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: uploader
        image: python:3.14.4-slim
        command:
        - python
        - -c
        - |
          import json, os, subprocess, sys
          from datetime import datetime, timezone

          # Install boto3 into a writable prefix (non-root pod)
          subprocess.check_call([sys.executable, "-m", "pip", "install",
                                 "--target", "/tmp/pylib", "boto3", "-q"])
          sys.path.insert(0, "/tmp/pylib")
          import boto3

          bucket = os.environ["sharedBucketName"]
          bucket_region = os.environ["sharedBucketRegion"]
          bucket_arn = os.environ["sharedBucketArn"]

          # Point the S3 client at the bucket's home region (global region),
          # which may differ from the cluster's regional deployment.
          s3 = boto3.client("s3", region_name=bucket_region)

          timestamp = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%SZ")
          key = f"uploads/{timestamp}.json"

          payload = {
              "timestamp": timestamp,
              "bucket_arn": bucket_arn,
              "bucket_region": bucket_region,
              "message": "Hello from the GCO cluster-shared bucket example",
          }
          body = json.dumps(payload, indent=2).encode("utf-8")

          s3.put_object(
              Bucket=bucket,
              Key=key,
              Body=body,
              ContentType="application/json",
          )

          uri = f"s3://{bucket}/{key}"
          print(f"Uploaded {len(body)} bytes to {uri}")
          print(f"Bucket region: {bucket_region}")
          print("Cluster-shared bucket upload completed successfully!")
        # Inject sharedBucketName / sharedBucketArn / sharedBucketRegion
        # directly as env vars from the ConfigMap.
        envFrom:
        - configMapRef:
            name: gco-cluster-shared-bucket
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      restartPolicy: Never
  backoffLimit: 2
