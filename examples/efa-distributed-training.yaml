# EFA-Enabled Distributed Training Example
#
# Uses Elastic Fabric Adapter for high-bandwidth, low-latency inter-node
# communication — up to 3.2 Tbps on P5/Trn2 and up to 28.8 Tbps on
# P6e-GB200. Required for large-scale NCCL-based multi-node training.
#
# Prerequisites:
#   - EFA-capable instance type (see list below)
#   - NVIDIA Network Operator enabled in cdk.json (on by default):
#       "helm": { "nvidia_network_operator": { "enabled": true } }
#   - Regional stack deployed: `gco stacks deploy-all -y`
#
# Usage:
#   gco jobs submit-direct examples/efa-distributed-training.yaml -r us-east-1
#
# Notes:
#   - Supported instance types: p4d.24xlarge (4x EFA), p5.48xlarge (32x EFA),
#     p6 (B200/B300), trn1.32xlarge, trn2.48xlarge.
#   - EFA bandwidth: P4d 400 Gbps, P5/P5e/P5en/Trn2 3,200 Gbps,
#     P6-B200 3.2 Tbps, P6e-GB200 28.8 Tbps.
#   - EKS Auto Mode uses EKS-optimized AMIs with host-level EFA components
#     already present.
#
# Docs: ../docs/INFERENCE.md
apiVersion: batch/v1
kind: Job
metadata:
  name: efa-training-job
  namespace: gco-jobs
spec:
  completions: 2
  parallelism: 2
  template:
    metadata:
      labels:
        app: efa-training
        project: gco
    spec:
      containers:
      - name: trainer
        image: python:3.14.4-slim
        securityContext:
          allowPrivilegeEscalation: false
        command: ["python3", "-c"]
        args:
        - |
          import os
          import socket
          hostname = socket.gethostname()
          efa_devices = os.environ.get("EFA_DEVICE_COUNT", "unknown")
          print(f"Node: {hostname}")
          print(f"EFA devices available: {efa_devices}")
          print(f"NCCL socket interface: {os.environ.get('NCCL_SOCKET_IFNAME', 'not set')}")
          print(f"FI_PROVIDER: {os.environ.get('FI_PROVIDER', 'not set')}")
          print("EFA distributed training job completed successfully")
        env:
        - name: FI_PROVIDER
          value: "efa"
        - name: NCCL_SOCKET_IFNAME
          value: "eth0"
        - name: FI_EFA_USE_DEVICE_RDMA
          value: "1"
        resources:
          requests:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: "8"
            vpc.amazonaws.com/efa: "4"
          limits:
            cpu: "16"
            memory: "128Gi"
            nvidia.com/gpu: "8"
            vpc.amazonaws.com/efa: "4"
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: vpc.amazonaws.com/efa
        operator: Equal
        value: "true"
        effect: NoSchedule
      nodeSelector:
        eks.amazonaws.com/instance-gpu-manufacturer: nvidia
      restartPolicy: Never
  backoffLimit: 2
