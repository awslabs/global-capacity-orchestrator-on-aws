# Simple Kubernetes Job Example
#
# A minimal job that prints a message, sleeps briefly, and exits. Useful for
# verifying cluster connectivity and the submission path end-to-end.
#
# Prerequisites:
#   - None
#
# Usage:
#   gco jobs submit-sqs examples/simple-job.yaml --region us-east-1
#   # or apply directly:
#   kubectl apply -f examples/simple-job.yaml
#
# Docs: ../docs/CLI.md

apiVersion: batch/v1
kind: Job
metadata:
  name: hello-gco
  namespace: gco-jobs
spec:
  ttlSecondsAfterFinished: 120  # Auto-delete 2 minutes after completion
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: hello
        image: busybox:1.37.0
        command: ['sh', '-c', 'echo "Hello from GCO!" && sleep 10 && echo "Job completed!"']
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      restartPolicy: Never
  backoffLimit: 3
