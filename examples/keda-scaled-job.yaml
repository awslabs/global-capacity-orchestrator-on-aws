# KEDA ScaledJob Example — Custom SQS Consumer
#
# NOTE: GCO ships with a built-in SQS consumer (post-helm-sqs-consumer.yaml) that
# automatically processes manifests submitted via `gco jobs submit-sqs`.
# You do NOT need this example for basic SQS job submission.
#
# Use this example as a starting point if you want to build a CUSTOM
# SQS-triggered job — e.g., processing messages from your own queue,
# running a different consumer logic, or scaling a different workload.
#
# Prerequisites:
#   - KEDA must be installed (enabled by default in GCO)
#   - GCO regional stack deployed (creates SQS queue automatically)
#
# Documentation: https://keda.sh/docs/latest/scalers/aws-sqs/

---
# ScaledJob - scales job replicas based on regional SQS queue depth
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: sqs-job-processor
  namespace: gco-jobs
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    backoffLimit: 3
    template:
      metadata:
        labels:
          app: sqs-processor
          gco.io/job-type: sqs-triggered
      spec:
        serviceAccountName: gco-service-account
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
        containers:
        - name: processor
          image: python:3.14-slim
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "-c"]
          args:
          - |
            pip install -q boto3
            python << 'EOF'
            import os
            import json
            import boto3
            import time

            queue_url = os.environ.get("JOB_QUEUE_URL")
            region = os.environ.get("AWS_REGION", "us-east-1")

            if not queue_url:
                print("ERROR: JOB_QUEUE_URL not set")
                exit(1)

            sqs = boto3.client("sqs", region_name=region)

            # Receive and process one message
            response = sqs.receive_message(
                QueueUrl=queue_url,
                MaxNumberOfMessages=1,
                WaitTimeSeconds=5,
                MessageAttributeNames=["All"]
            )

            messages = response.get("Messages", [])
            if not messages:
                print("No messages to process")
                exit(0)

            message = messages[0]
            receipt_handle = message["ReceiptHandle"]
            body = json.loads(message["Body"])

            job_id = body.get("job_id", "unknown")
            manifests = body.get("manifests", [])
            print(f"Processing job: {job_id}")
            print(f"Manifests: {len(manifests)}")

            # Simulate processing
            time.sleep(10)

            # Delete message after successful processing
            sqs.delete_message(
                QueueUrl=queue_url,
                ReceiptHandle=receipt_handle
            )

            print("Job processed successfully!")
            EOF
          env:
          - name: JOB_QUEUE_URL
            value: "{{JOB_QUEUE_URL}}"
          - name: AWS_REGION
            value: "{{REGION}}"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
        restartPolicy: Never

  # Scaling configuration
  pollingInterval: 15            # Check queue every 15 seconds
  successfulJobsHistoryLimit: 10 # Keep 10 successful jobs
  failedJobsHistoryLimit: 5      # Keep 5 failed jobs
  maxReplicaCount: 20            # Maximum concurrent jobs
  minReplicaCount: 0             # Scale to zero when queue is empty

  # SQS trigger - scales based on regional job queue
  # KEDA operator uses its IRSA role for SQS access (no TriggerAuthentication needed)
  triggers:
  - type: aws-sqs-queue
    metadata:
      queueURL: "{{JOB_QUEUE_URL}}"
      queueLength: "5"
      awsRegion: "{{REGION}}"
      identityOwner: operator
