# kind cluster config used by integration:kind:cluster-e2e.
# Disables the default kindnet CNI so Calico can be installed on top
# and actually enforce the NetworkPolicy resources from
# lambda/kubectl-applier-simple/manifests/03-network-policies.yaml.
# kindnet itself does not enforce NetworkPolicy.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
  - role: control-plane
