# Configuration for auto-generated GitHub Release notes.
# Invoked by release.yml when it calls `gh release create --generate-notes`.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
  categories:
    - title: Breaking changes
      labels:
        - breaking
        - breaking-change
    - title: Features
      labels:
        - feat
        - feature
        - enhancement
    - title: Bug fixes
      labels:
        - fix
        - bug
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: Dependencies
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
