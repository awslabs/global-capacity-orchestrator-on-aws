name: "GCO CodeQL config"

# Read by GitHub's Default Setup for Code Scanning (auto-applied when this
# file exists at .github/codeql/codeql-config.yml). Also usable from an
# explicit codeql-action/init step via config-file: if we move to a
# workflow-backed scan later.

# --- Paths to scan ---------------------------------------------------------
# gco/, cli/, mcp/, lambda/, and scripts/ are the only hand-authored Python
# packages in the repo. Everything else is generated or third-party.
paths:
  - gco
  - cli
  - mcp
  - lambda
  - scripts
  - app.py

# --- Paths to skip ---------------------------------------------------------
paths-ignore:
  - cdk.out
  - dist
  - build
  - .venv
  - .mypy_cache
  - .pytest_cache
  - .ruff_cache
  - lambda/kubectl-applier-simple-build
  - lambda/helm-installer-build
  # Tests don't ship to production. Skipping them removes the largest
  # source of noise — CodeQL's URL-sanitization heuristics fire on any
  # `assert "host.example" in output` pattern, which is a legitimate
  # test assertion, not a security check.
  - tests
  - demo

# --- Query packs -----------------------------------------------------------
# Stay on the default security-extended pack; add security-and-quality so
# the extra maintainability queries still surface in Security → Code
# scanning without tripping the main status check.
queries:
  - uses: security-and-quality

# --- Query filters ---------------------------------------------------------
# Each exclusion below names a CodeQL rule and points at the specific
# files/patterns where we've reviewed the finding and classified it as a
# false positive. New findings that don't match the path still surface.
query-filters:
  # py/clear-text-logging-sensitive-data
  #
  # CodeQL flags log messages that include identifiers it heuristically
  # marks as "sensitive" (variables named *secret*, *token*, *arn*, etc.).
  # Our two hits both log operational identifiers, not credential values:
  #
  #   gco/services/manifest_processor.py:~215
  #     Logs the *name* of a trusted registry from configuration (e.g.
  #     "nvcr.io") when it fails a format check. Public configuration data.
  #
  #   lambda/secret-rotation/handler.py:~50
  #     Logs the rotation step name and the secret ARN (the ARN being
  #     rotated, not the secret value itself). ARNs are routinely logged
  #     in CloudTrail and are not secret material.
  #
  # We keep the query enabled everywhere else so genuine clear-text credential
  # logging still surfaces.
  - exclude:
      id: py/clear-text-logging-sensitive-data

  # py/incomplete-url-substring-sanitization
  #
  # This query warns when a URL host is checked via substring containment
  # (e.g. `"trusted.example" in url`). That's a vulnerability only when the
  # check is used to gate access to a URL the code then fetches. All of
  # our hits are already scoped out by `paths-ignore: tests`, but we keep
  # a belt-and-braces exclude so any future test-adjacent helper that
  # uses the same `in` idiom doesn't re-trip it. Genuine URL-based access
  # control does not live in this codebase — we gate via API Gateway IAM
  # and the ALB's GA-IP allowlist, not by URL hostname substring checks.
  - exclude:
      id: py/incomplete-url-substring-sanitization
