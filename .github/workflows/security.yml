# =============================================================================
# security.yml — Security & compliance scans
# =============================================================================
#
# Maps to the "Security" row of the README badge table.
#
# Triggers: push: main, pull_request, workflow_dispatch.
#
# Jobs (alphabetical by display name):
#   - security:bandit:sast               — bandit on gco/, cli/
#   - security:checkov:iac               — checkov against the whole repo
#   - security:codeql:python-code-analysis
#                                        — CodeQL security-and-quality pack on Python
#   - security:gitleaks:secrets          — gitleaks on current files (no git history)
#   - security:kics:iac                  — KICS on cdk.out (needs CDK synth first)
#   - security:pip-audit:deps            — pip-audit on requirements-lock.txt
#   - security:semgrep:sast              — semgrep scan --config auto
#   - security:trivy:filesystem          — trivy fs on the source tree
#   - security:trivy:container-scan      — trivy image on each built service image
#   - security:trufflehog:secrets        — trufflehog filesystem scan
#
# All scans are strict: if a scan finds issues the job fails. Fix the code,
# don't silence the tool — policy inherited from the retired GitLab pipeline.
#
# =============================================================================

name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-bandit-sast:
    name: "security:bandit:sast"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[security]"
      - name: Run bandit
        run: |
          bandit -r gco/ cli/ -c pyproject.toml --severity-level medium \
            -f json -o bandit-report.json
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  security-pip-audit-deps:
    name: "security:pip-audit:deps"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Run pip-audit
        # First invocation writes the artifact even on failure; the second
        # fails the job when vulnerabilities are present. Mirrors the
        # retired GitLab pipeline.
        run: |
          set -uo pipefail
          pip-audit -r requirements-lock.txt --format json \
            --output pip-audit-report.json --desc || true
          pip-audit -r requirements-lock.txt --desc
      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  security-trivy-filesystem:
    name: "security:trivy:filesystem"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Pin in lockstep with TRIVY_VERSION in cve-scan.yml.
      TRIVY_VERSION: "v0.70.0"
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Trivy
        # Install directly from the upstream script rather than using
        # aquasecurity/trivy-action — the action transitively depends on
        # aquasecurity/setup-trivy tags that have been yanked in the past
        # ("v0.2.2" unresolvable), breaking CI. cve-scan.yml uses the same
        # install pattern.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
          trivy --version
      - name: Trivy filesystem scan
        run: |
          set -euo pipefail
          # Table to the job log + JSON to the artifact.
          # --ignorefile points at .trivyignore (dated CVE suppressions).
          trivy fs \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --scanners vuln \
            --skip-version-check \
            --ignorefile .trivyignore \
            --format json \
            --output trivy-fs-report.json \
            .
          trivy fs \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --scanners vuln \
            --skip-version-check \
            --ignorefile .trivyignore \
            .
      - name: Upload trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-fs-report
          path: trivy-fs-report.json
          retention-days: 30

  security-trivy-container-scan:
    name: "security:trivy:container-scan"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Rebuild the service images locally and scan each with Trivy. Fills a
    # gap the AWS GitLab runner couldn't handle (docker builds were flaky).
    # We rebuild here rather than passing images between workflows via
    # `workflow_call` — simpler and the build time is modest.
    env:
      TRIVY_VERSION: "v0.70.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: health-monitor
            dockerfile: dockerfiles/health-monitor-dockerfile
          - image: manifest-processor
            dockerfile: dockerfiles/manifest-processor-dockerfile
          - image: inference-monitor
            dockerfile: dockerfiles/inference-monitor-dockerfile
          - image: queue-processor
            dockerfile: dockerfiles/queue-processor-dockerfile
          - image: helm-installer
            dockerfile: lambda/helm-installer/Dockerfile
            context: lambda/helm-installer
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
          trivy --version
      - name: Build image
        env:
          CONTEXT: ${{ matrix.context || '.' }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          IMAGE: ${{ matrix.image }}
        run: docker build -f "$DOCKERFILE" -t "${IMAGE}:scan" "$CONTEXT"
      - name: Trivy image scan
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          # Scan twice: once in table format so the failure is human-readable
          # in the job log, once in JSON so the artifact upload captures
          # machine-readable output. --scanners=vuln narrows the scan to
          # CVEs (gitleaks + trufflehog cover secrets in their own jobs).
          # --ignorefile points at .trivyignore (dated CVE suppressions).
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --skip-version-check \
            --ignorefile .trivyignore \
            --format json \
            --output "trivy-${IMAGE}-report.json" \
            "${IMAGE}:scan"
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --skip-version-check \
            --ignorefile .trivyignore \
            "${IMAGE}:scan"
      - name: Upload trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-image-${{ matrix.image }}
          path: trivy-${{ matrix.image }}-report.json
          retention-days: 30

  security-trufflehog-secrets:
    name: "security:trufflehog:secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run TruffleHog
        run: |
          docker run --rm -v "$PWD":/repo \
            trufflesecurity/trufflehog:3.95.2 \
            filesystem /repo --only-verified --fail --json > trufflehog-report.json 2>&1
      - name: Upload trufflehog report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trufflehog-report
          path: trufflehog-report.json
          retention-days: 30

  security-gitleaks-secrets:
    name: "security:gitleaks:secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD":/repo -w /repo \
            zricethezav/gitleaks:v8.30.1 \
            detect --source . --no-git \
            --config .gitleaks.toml \
            --report-format json --report-path gitleaks-report.json
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  security-semgrep-sast:
    name: "security:semgrep:sast"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep:1.161.0
    steps:
      - uses: actions/checkout@v6
      - name: Run semgrep
        run: semgrep scan --config auto --error --json -o semgrep-report.json .
      - name: Upload semgrep report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  security-checkov-iac:
    name: "security:checkov:iac"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run checkov
        run: |
          docker run --rm -v "$PWD":/repo -w /repo \
            bridgecrew/checkov:3.2.524 \
            -d . --config-file .checkov.yaml -o json > checkov-report.json
      - name: Upload checkov report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkov-report
          path: checkov-report.json
          retention-days: 30

  security-kics-iac:
    name: "security:kics:iac"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install CDK + deps and synthesize
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cdk]"
          npm install -g aws-cdk
      - uses: ./.github/actions/build-lambda-package
      - name: cdk synth
        run: cdk synth --quiet
      - name: Run KICS
        run: |
          docker run --rm -v "$PWD":/repo -w /repo \
            checkmarx/kics:v2.1.20 \
            scan -p cdk.out -o . \
            --report-formats json,html \
            --output-name kics-report \
            --config .kics.yaml --fail-on high
      - name: Upload KICS report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kics-report
          path: |
            kics-report.json
            kics-report.html
          retention-days: 30
  security-codeql-python-code-analysis:
    name: "security:codeql:python-code-analysis"
    # CodeQL is strict like every other job in this file: if a query in the
    # security-and-quality pack raises a finding that isn't filtered by
    # .github/codeql/codeql-config.yml, the analyze step fails the job.
    #
    # Why a workflow-file scan (Advanced Setup) rather than GitHub's
    # Default Setup: Default Setup ignores the YAML config file on disk
    # and stores its filters in repo Settings instead. That hides the
    # allow-list / paths-ignore choices from code review and from this
    # file's reviewers. Advanced Setup loads the config via the action's
    # ``config-file`` input so every suppression is pinned in git.
    #
    # To swap back to Default Setup: disable this job (comment it out)
    # and re-enable Default Setup in Settings → Code security → CodeQL.
    # The config file has no effect under Default Setup.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Needed to upload SARIF to the Code Scanning API. Overrides the
      # top-level ``permissions: contents: read`` for this job only.
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Pins paths, paths-ignore, and query-filters used by the scan.
          # See the file itself for the rationale behind each filter.
          config-file: ./.github/codeql/codeql-config.yml
      # No build step — the Python extractor reads the source tree
      # directly. The autobuilder is a no-op for Python and has a bug
      # (``NotADirectoryError`` on single-file ``paths:`` entries) so
      # we avoid invoking it.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
