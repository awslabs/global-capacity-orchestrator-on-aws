# =============================================================================
# lint.yml — Linting & static style checks
# =============================================================================
#
# Maps to the "Linting" row of the README badge table.
#
# Triggers:
#   - push to main
#   - pull_request
#   - workflow_dispatch (manual)
#
# Jobs (display names are colon-delimited, job IDs are hyphen-delimited):
#   - lint:actionlint:workflows   — validates .github/workflows/*.yml
#   - lint:hadolint:dockerfile    — hadolint on every Dockerfile
#   - lint:markdownlint:md        — markdownlint-cli2 across all Markdown files
#   - lint:mypy:strict            — mypy on gco/ (excluding stacks), cli/, mcp/, scripts/
#   - lint:mypy:stacks            — mypy on gco/stacks/ + app.py (requires CDK)
#   - lint:mypy:lambda            — mypy on each lambda/ subdir independently
#   - lint:python:formatters      — consolidated: black + isort + flake8 + yamllint
#   - lint:ruff:python            — ruff check (prebuilt binary via astral-sh/ruff-action)
#   - lint:shellcheck:shell       — shellcheck -x on every .sh file
#
# Every job has `timeout-minutes` to cap runaway runs.
# Concurrency control cancels in-flight runs when a newer commit lands on the
# same ref (safe for CI, off for release.yml).
#
# =============================================================================

name: Linting

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-actionlint-workflows:
    name: "lint:actionlint:workflows"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        # Invoke the upstream install script directly — the third-party
        # `raven-actions/actionlint` action had compatibility issues with
        # the current `@actions/tool-cache` runtime.
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -version
      - name: Run actionlint
        run: ./actionlint -color

  # --------------------------------------------------------------------------
  # Consolidated Python/YAML lint job.
  #
  # black, isort, flake8, and yamllint each do ~5-10s of work against the
  # same source tree. Running them in separate jobs means four runner
  # startups and four pip installs of the same seven-package `[lint]`
  # extra per CI run. Folding them into one job cuts runner overhead
  # without sacrificing visibility — each tool is a named step and uses
  # `if: always()` so one failure doesn't hide the others.
  #
  # Kept separate from the rest of the file:
  #   - lint:ruff:python        (prebuilt binary via astral-sh/ruff-action)
  #   - lint:markdownlint:md    (third-party action, no pip install needed)
  #   - lint:hadolint:dockerfile / lint:shellcheck:shell (docker-run)
  #   - lint:actionlint:workflows (upstream install script)
  #   - lint:mypy:*             (three mypy jobs with separate cache keys)
  # Each of those has either a different toolchain or a different caching
  # story that a matrix/consolidation would disrupt.
  # --------------------------------------------------------------------------
  lint-python-formatters:
    name: "lint:python:formatters"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install lint dependencies
        run: pip install -e ".[lint]"
      - name: black --check
        if: always()
        run: |
          black --check --diff \
            --exclude '/(\.venv|cdk\.out|lambda/kubectl-applier-simple-build|lambda/helm-installer-build)/' \
            gco/ cli/ mcp/ tests/ lambda/ scripts/
      - name: isort --check-only
        if: always()
        run: |
          isort --check-only --diff \
            --skip-glob 'cdk.out*' \
            --skip-glob 'lambda/kubectl-applier-simple-build*' \
            --skip-glob 'lambda/helm-installer-build*' \
            gco/ cli/ mcp/ tests/ lambda/ scripts/
      - name: flake8
        if: always()
        run: |
          flake8 gco/ cli/ mcp/ tests/ lambda/ scripts/ \
            --exclude lambda/kubectl-applier-simple-build,lambda/helm-installer-build
      - name: yamllint
        if: always()
        run: yamllint --strict .

  lint-ruff-python:
    name: "lint:ruff:python"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run ruff
        # astral-sh/ruff-action ships a prebuilt ruff binary, skipping the
        # ~30-40s setup-python + pip-install-e-[lint] overhead the other
        # lint jobs pay. The version is pinned to match the ruff==0.15.7
        # entry in pyproject.toml's [project.optional-dependencies] lint
        # group so the pre-commit hook, developer installs, and CI stay
        # in lockstep. Bump both together.
        #
        # The action invokes `ruff <args> <src>`, so `args` carries the
        # command + flags and `src` carries the positional paths.
        uses: astral-sh/ruff-action@v4
        with:
          version: "0.15.7"
          args: "check --exclude lambda/kubectl-applier-simple-build --exclude lambda/helm-installer-build"
          src: >-
            gco/
            cli/
            mcp/
            tests/

  lint-markdownlint-md:
    name: "lint:markdownlint:md"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint-cli2
        # Pin to a specific action version so a new major rev doesn't quietly
        # start firing new rules. Configuration (rule set, globs, ignores) lives
        # in .markdownlint-cli2.yaml at the repo root; see CONTRIBUTING.md for
        # how to run the same check locally.
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  lint-hadolint-dockerfile:
    name: "lint:hadolint:dockerfile"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run hadolint on every Dockerfile
        # DL3008 (apt pin) and DL3013 (pip pin) are ignored to match the
        # policy inherited from the GitLab pipeline. Revisit once all base
        # images switch to pip-tools-style pinning.
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/repo -w /repo \
            hadolint/hadolint:v2.14.0-debian \
            bash -c '
              set -euo pipefail
              FOUND=0
              while IFS= read -r df; do
                FOUND=1
                echo "=== Linting $df ==="
                hadolint "$df" --ignore DL3008 --ignore DL3013
              done < <(find . -type f \( -name "Dockerfile*" -o -name "*dockerfile" -o -name "*Dockerfile" \) \
                -not -path "./.git/*" \
                -not -path "./cdk.out/*" \
                -not -path "./.venv/*" \
                -not -path "./lambda/kubectl-applier-simple-build/*" \
                -not -path "./lambda/helm-installer-build/*")
              if [ "$FOUND" -eq 0 ]; then
                echo "No Dockerfiles found — failing to avoid silent pass."
                exit 1
              fi
            '

  lint-shellcheck-shell:
    name: "lint:shellcheck:shell"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        # -x follows source directives so sourced files are resolved.
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/repo -w /repo \
            koalaman/shellcheck-alpine:v0.11.0 \
            sh -c '
              set -eu
              FOUND=0
              find . -name "*.sh" \
                -not -path "./.git/*" \
                -not -path "./cdk.out/*" \
                -not -path "./.venv/*" \
                -not -path "./lambda/kubectl-applier-simple-build/*" \
                -not -path "./lambda/helm-installer-build/*" \
                > /tmp/shellfiles
              while IFS= read -r sh; do
                FOUND=1
                echo "=== Checking $sh ==="
                shellcheck -x "$sh"
              done < /tmp/shellfiles
              if [ "$FOUND" -eq 0 ]; then
                echo "No shell scripts found — failing to avoid silent pass."
                exit 1
              fi
            '

  lint-mypy-strict:
    name: "lint:mypy:strict"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install typecheck dependencies
        run: |
          # Install full project + mcp extras so mypy can resolve real types
          # for boto3, kubernetes, fastapi, click, fastmcp. CDK is intentionally
          # NOT installed here — gco/stacks/ is checked in lint-mypy-stacks.
          pip install -e ".[typecheck,mcp]"
      - name: Cache mypy results
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-strict-${{ hashFiles('pyproject.toml', 'requirements-lock.txt') }}
      - name: Run mypy
        run: mypy gco/ cli/ mcp/ scripts/ --exclude 'gco/stacks/'

  lint-mypy-stacks:
    name: "lint:mypy:stacks"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install typecheck + cdk dependencies
        run: |
          pip install -e ".[cdk,typecheck]"
      - name: Cache mypy results
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-stacks-${{ hashFiles('pyproject.toml', 'requirements-lock.txt') }}
      - name: Run mypy on stacks + app.py
        run: mypy gco/stacks/ app.py

  lint-mypy-lambda:
    name: "lint:mypy:lambda"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install typecheck dependencies
        run: |
          pip install -e ".[typecheck]"
      - name: Cache mypy results
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-lambda-${{ hashFiles('pyproject.toml', 'requirements-lock.txt') }}
      - name: Run mypy on each Lambda dir
        # Each Lambda ships its own handler.py; check them one at a time so
        # mypy's module resolver doesn't treat them as duplicates.
        run: |
          set -uo pipefail
          FAILED=0
          for d in lambda/alb-header-validator lambda/api-gateway-proxy \
                   lambda/cross-region-aggregator lambda/drift-detection \
                   lambda/ga-registration lambda/helm-installer \
                   lambda/kubectl-applier-simple lambda/proxy-shared \
                   lambda/regional-api-proxy lambda/secret-rotation; do
            echo "=== typecheck: $d ==="
            if ! mypy "$d"; then
              FAILED=1
            fi
          done
          exit "$FAILED"
