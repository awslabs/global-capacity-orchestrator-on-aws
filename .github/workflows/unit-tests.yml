# =============================================================================
# unit-tests.yml — Unit tests & fast smoke tests
# =============================================================================
#
# Maps to the "Unit Tests" row of the README badge table.
#
# Triggers: push: main, pull_request, workflow_dispatch.
#
# Jobs (alphabetical by display name):
#   - unit:bats:shell              — BATS shell tests
#   - unit:cdk:config-matrix       — scripts/test-cdk-synthesis.py (config combos)
#   - unit:cdk:synth               — cdk synth of the default config
#   - unit:cli:smoke               — gco --help and all subcommand help pages
#   - unit:fresh-install           — pip install from scratch, verify imports
#   - unit:lockfile:freshness      — requirements-lock.txt matches pyproject.toml
#   - unit:pytest:core             — pytest (coverage target 85%) + publish badges
#   - unit:workload:imports        — K8s service import + circular-import detection
#
# The unit:pytest:core job also publishes auto-generated pytest-count.json and
# coverage.json to the `badges` orphan branch on `push: main`.
#
# =============================================================================

name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-pytest-core:
    name: "unit:pytest:core"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Badge writes need contents: write. Fork PRs still run with read-only
    # token — the badge-update step is gated on `push: main` so this is safe.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"
      - uses: ./.github/actions/build-lambda-package
      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --ignore=tests/test_integration.py \
            --cov=gco --cov=cli \
            --cov-report=xml --cov-report=html --cov-report=json \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --junitxml=report.xml -x
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-coverage
          path: |
            htmlcov/
            coverage.xml
            coverage.json
            report.xml
          retention-days: 7
      - name: Compute pytest count and coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: counts
        run: |
          set -euo pipefail
          pytest tests/ --collect-only -q > /tmp/pytest-collect.txt || true
          # `pytest --collect-only -q` ends with a line like
          #   "3610 tests collected in 12.3s" — grab the integer.
          count=$(grep -oE '^[0-9]+ tests? collected' /tmp/pytest-collect.txt | awk '{print $1}' | tail -1)
          if [ -z "$count" ]; then
            echo "Could not parse pytest count; skipping badge update."
            count=0
          fi
          coverage=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "pytest_count=$count" >> "$GITHUB_OUTPUT"
          echo "coverage=$coverage" >> "$GITHUB_OUTPUT"
      - name: Publish pytest + coverage badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.counts.outputs.pytest_count != '0'
        uses: ./.github/actions/publish-badges
        with:
          files: |
            pytest-count.json={"schemaVersion":1,"label":"pytest","message":"${{ steps.counts.outputs.pytest_count }}","color":"blue"}
            coverage.json={"schemaVersion":1,"label":"coverage","message":"${{ steps.counts.outputs.coverage }}%","color":"brightgreen"}

  unit-bats-shell:
    name: "unit:bats:shell"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq python3 python3-yaml bash
      - name: Run BATS suite
        run: bats tests/BATS/
      - name: Count BATS tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: count
        run: |
          set -euo pipefail
          # `bats --count <dir>` returns the number of @test blocks across
          # every .bats file under the directory.
          count=$(bats --count tests/BATS/)
          echo "bats_count=$count" >> "$GITHUB_OUTPUT"
      - name: Publish BATS count badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/publish-badges
        with:
          files: |
            bats-count.json={"schemaVersion":1,"label":"BATS","message":"${{ steps.count.outputs.bats_count }}","color":"blue"}

  unit-cli-smoke:
    name: "unit:cli:smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Exercise CLI surface
        run: |
          python -c "from cli import GCOConfig, JobManager, CapacityChecker; print('CLI imports OK')"
          gco --help
          gco jobs --help
          gco capacity --help
          gco stacks --help
          gco costs --help
          gco dag --help
          gco inference --help

  unit-cdk-synth:
    name: "unit:cdk:synth"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install CDK + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cdk]"
          npm install -g aws-cdk
      - uses: ./.github/actions/build-lambda-package
      - name: cdk synth
        run: cdk synth --quiet
      - name: Upload cdk.out
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cdk-synth-output
          path: cdk.out/
          retention-days: 7

  unit-cdk-config-matrix:
    name: "unit:cdk:config-matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_ACCESS_KEY_ID: "fake"
      AWS_SECRET_ACCESS_KEY: "fake"
      AWS_DEFAULT_REGION: "us-east-1"
      CDK_DEFAULT_REGION: "us-east-1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install CDK + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cdk]"
          npm install -g aws-cdk@2
      - uses: ./.github/actions/build-lambda-package
      - name: Run config matrix
        run: python3 scripts/test-cdk-synthesis.py --verbose

  unit-lockfile-freshness:
    name: "unit:lockfile:freshness"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools
      - name: Verify lockfile is up to date
        # Pre-seed the candidate lockfile with the committed one so pip-compile
        # treats the existing pins as the current resolution state. Without
        # this, an unrelated transitive release between a local pip-compile
        # and the CI run would falsely flag drift. See the comment block in
        # the retired .gitlab-ci.yml for the full rationale.
        run: |
          set -euo pipefail
          cp requirements-lock.txt /tmp/requirements-lock-fresh.txt
          pip-compile --no-emit-index-url --strip-extras -o /tmp/requirements-lock-fresh.txt pyproject.toml -q
          grep -v '^#' requirements-lock.txt > /tmp/lock-no-comments.txt
          grep -v '^#' /tmp/requirements-lock-fresh.txt > /tmp/fresh-no-comments.txt
          if ! diff /tmp/lock-no-comments.txt /tmp/fresh-no-comments.txt; then
            echo ""
            echo "ERROR: requirements-lock.txt is stale."
            echo "Run: pip-compile --no-emit-index-url --strip-extras -o requirements-lock.txt pyproject.toml"
            echo "Then commit the updated lockfile."
            exit 1
          fi
          echo "Lockfile is up to date"

  unit-fresh-install:
    name: "unit:fresh-install"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          # Intentionally no pip cache — this job verifies a cold install.
      - name: Fresh install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cdk]"
      - name: Verify imports
        run: |
          python3 -c "import aws_cdk; import cdk_nag; import aws_cdk.aws_eks_v2; print('All CDK imports OK')"
          python3 -c "import click; import boto3; import requests; import yaml; print('All runtime imports OK')"
          python3 -c "from cli.main import cli; print('CLI entry point OK')"
          python3 -c "from gco.stacks.regional_stack import GCORegionalStack; print('Regional stack import OK')"

  unit-workload-imports:
    name: "unit:workload:imports"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-lock.txt"
      - name: Install core + inference-monitor extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ".[inference-monitor]"
      - name: Import health-monitor + manifest-processor
        run: |
          python -c "from gco.services.health_api import app; print('health-monitor OK')"
          python -c "from gco.services.manifest_api import app; print('manifest-processor OK')"
      - name: Import inference-monitor
        run: |
          python -c "from gco.services.inference_monitor import InferenceMonitor; print('inference-monitor OK')"
      - name: Detect circular imports via importlib
        # importlib.import_module executes all module-level code including
        # deferred router imports; plain `import` can paper over cycles.
        run: |
          python -c "import importlib; importlib.import_module('gco.services.manifest_api'); print('manifest-api full import OK')"
          python -c "import importlib; importlib.import_module('gco.services.health_api'); print('health-api full import OK')"
          python -c "import importlib; importlib.import_module('gco.services.inference_monitor'); print('inference-monitor full import OK')"
          python -c "from gco.services.api_routes import jobs, manifests, queue, templates, webhooks; print('all api_routes OK')"
