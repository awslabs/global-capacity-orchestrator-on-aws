# Dependabot scope is GitHub Actions + Docker only.
# Python dependencies are intentionally NOT tracked here — they are pinned
# via `requirements-lock.txt` with `pip-compile` and reviewed intentionally.
# The monthly `deps-scan` workflow + weekly `cve-scan` cover CVE-driven
# Python bumps.

version: 2
updates:
  # Keep actions (actions/checkout, actions/setup-python, etc.) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # Service image base layers.
  - package-ecosystem: "docker"
    directory: "/dockerfiles"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"

  # Helm-installer Lambda container base image.
  - package-ecosystem: "docker"
    directory: "/lambda/helm-installer"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # Dev container base image (Dockerfile.dev lives at the repo root).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
