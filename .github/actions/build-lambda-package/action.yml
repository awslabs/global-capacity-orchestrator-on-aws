name: "Build Lambda package"
description: >
  Builds the `lambda/kubectl-applier-simple-build` and `lambda/helm-installer-build`
  directories that CDK synth, pytest, and KICS scans expect. Ports the
  `.build-lambda-package` YAML anchor from the retired GitLab pipeline into a
  composite action so jobs reference this single source of truth via
  `uses: ./.github/actions/build-lambda-package` instead of duplicating the
  copy/install logic.

  Runs `pip install kubernetes pyyaml urllib3 -t lambda/kubectl-applier-simple-build/`
  which requires a working Python environment — the caller must set up Python
  (typically with `actions/setup-python`) before invoking this action.

runs:
  using: "composite"
  steps:
    - name: Build kubectl-applier-simple-build
      shell: bash
      run: |
        set -euo pipefail
        rm -rf lambda/kubectl-applier-simple-build
        mkdir -p lambda/kubectl-applier-simple-build
        cp lambda/kubectl-applier-simple/handler.py lambda/kubectl-applier-simple-build/
        cp -r lambda/kubectl-applier-simple/manifests lambda/kubectl-applier-simple-build/
        pip install --quiet kubernetes pyyaml urllib3 -t lambda/kubectl-applier-simple-build/

    - name: Build helm-installer-build
      shell: bash
      run: |
        set -euo pipefail
        rm -rf lambda/helm-installer-build
        cp -r lambda/helm-installer lambda/helm-installer-build
        rm -rf lambda/helm-installer-build/__pycache__
