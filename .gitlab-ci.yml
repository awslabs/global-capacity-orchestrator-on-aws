    BUMP_TYPE: patch

release:minor:
  extends: .release-base
  variables:
    BUMP_TYPE: minor

release:major:
  extends: .release-base
  variables:
    BUMP_TYPE: major

# =============================================================================
# MAINTENANCE - Manual + Scheduled jobs
# =============================================================================

# Shared dependency scan script (used by both manual and scheduled jobs)
.dependency-scan-script: &dependency-scan-script
  - |
    set +e  # Don't exit on errors - we want to continue checking

    # =======================================================================
    # Check Python dependencies
    # =======================================================================
    echo "=== Checking for outdated Python dependencies ==="

    pip install -e . --quiet --root-user-action=ignore
    OUTDATED=$(pip list --outdated --format=json)
    PYTHON_COUNT=$(echo "$OUTDATED" | jq 'length')

    if [ "$PYTHON_COUNT" -eq 0 ]; then
      echo "All Python dependencies are up to date!"
      PYTHON_OUTDATED=""
    else
      echo "Found $PYTHON_COUNT outdated Python package(s)"
      echo "$OUTDATED" | jq -r '.[] | "  - \(.name): \(.version) -> \(.latest_version)"'
      PYTHON_OUTDATED="$OUTDATED"
    fi

    # =======================================================================
    # Check Docker image versions
    # =======================================================================
    echo ""
    echo "=== Checking for outdated Docker images ==="

    # Create temp file for Docker results (avoids subshell variable issues)
    DOCKER_RESULTS=$(mktemp)

    # Function to check a single image
    check_image() {
      local image="$1"
      local current_tag="$2"

      # Skip non-semver tags
      if ! echo "$current_tag" | grep -qE "^v?[0-9]+\.[0-9]+(\.[0-9]+)?"; then
        return
      fi

      # Skip gco project images (we control those)
      if echo "$image" | grep -q "^gco/"; then
        return
      fi

      # Determine registry and repo
      local registry=""
      local repo=""
      case "$image" in
        nvcr.io/*|gcr.io/*|quay.io/*|ghcr.io/*|registry.k8s.io/*)
          registry=$(echo "$image" | cut -d'/' -f1)
          repo=$(echo "$image" | cut -d'/' -f2-)
          ;;
        */*)
          # Docker Hub org/repo
          registry="docker.io"
          repo="$image"
          ;;
        *)
          # Docker Hub library image
          registry="docker.io"
          repo="library/$image"
          ;;
      esac

      # Query registry for tags
      local tags=""
      tags=$(skopeo list-tags "docker://${registry}/${repo}" 2>/dev/null | \
        jq -r '.Tags[]' 2>/dev/null | \
        grep -E "^v?[0-9]+\.[0-9]+\.[0-9]+$" | \
        sort -V | tail -10) || return

      [ -z "$tags" ] && return

      local latest_tag=$(echo "$tags" | tail -1)
      local current_ver=$(echo "$current_tag" | sed 's/^v//')
      local latest_ver=$(echo "$latest_tag" | sed 's/^v//')

      # Check if latest is newer
      if [ "$current_ver" != "$latest_ver" ]; then
        local newer=$(printf '%s\n%s' "$current_ver" "$latest_ver" | sort -V | tail -1)
        if [ "$newer" = "$latest_ver" ]; then
          echo "  - ${image}:${current_tag} -> ${latest_tag}"
          echo "${image}|${current_tag}|${latest_tag}" >> "$DOCKER_RESULTS"
        fi
      fi
    }

    # Collect all images to check
    ALL_IMAGES=$(mktemp)

    # From .gitlab-ci.yml
    echo "Checking CI images..."
    grep -oE "image: [a-zA-Z0-9_./-]+:[a-zA-Z0-9._-]+" .gitlab-ci.yml 2>/dev/null | \
      sed 's/image: //' >> "$ALL_IMAGES"
    # Also check nested image definitions (e.g. image: { name: ... }) used by Trivy, KICS, etc.
    grep -oE "name: [a-zA-Z0-9_./-]+:[a-zA-Z0-9._-]+" .gitlab-ci.yml 2>/dev/null | \
      grep -v 'name: keda\|name: nvidia\|name: kedacore\|name: gpu-nodes\|name: workers' | \
      sed 's/name: //' >> "$ALL_IMAGES"

    # From K8s manifests (skip template variables)
    echo "Checking K8s manifest images..."
    grep -rhoE "image: [a-zA-Z0-9_./-]+:[a-zA-Z0-9._-]+" lambda/kubectl-applier-simple/manifests/ 2>/dev/null | \
      grep -v '{{' | sed 's/image: //' >> "$ALL_IMAGES"

    # From example manifests
    echo "Checking example manifest images..."
    grep -rhoE "image: [a-zA-Z0-9_./-]+:[a-zA-Z0-9._-]+" examples/ 2>/dev/null | \
      sed 's/image: //' >> "$ALL_IMAGES"

    # From Helm chart values in charts.yaml (repository + tag pairs)
    echo "Checking Helm chart value images..."
    python3 -c "
    import yaml
    with open('lambda/helm-installer/charts.yaml') as f:
        data = yaml.safe_load(f)
    def find_images(d):
        if isinstance(d, dict):
            repo = d.get('repository', '')
            tag = d.get('tag', '')
            if repo and tag and '/' in repo:
                print(f'{repo}:{tag}')
            for v in d.values():
                find_images(v)
        elif isinstance(d, list):
            for item in d:
                find_images(item)
    for name, cfg in data.get('charts', {}).items():
        find_images(cfg.get('values', {}))
    " >> "$ALL_IMAGES" 2>/dev/null || true

    # Check each unique image
    sort -u "$ALL_IMAGES" | while read -r img; do
      [ -z "$img" ] && continue
      image=$(echo "$img" | cut -d':' -f1)
      tag=$(echo "$img" | cut -d':' -f2)
      check_image "$image" "$tag"
    done

    rm -f "$ALL_IMAGES"

    DOCKER_COUNT=$(wc -l < "$DOCKER_RESULTS" | tr -d ' ')
    [ "$DOCKER_COUNT" = "" ] && DOCKER_COUNT=0

    # =======================================================================
    # Check Helm chart versions (from charts.yaml)
    # =======================================================================
    echo ""
    echo "=== Checking Helm chart versions ==="

    HELM_RESULTS=$(mktemp)
    CHARTS_FILE="lambda/helm-installer/charts.yaml"

    if [ -f "$CHARTS_FILE" ]; then
      # Extract chart entries: name, repo_url, chart, version, use_oci
      python3 -c "
    import yaml, json
    with open('$CHARTS_FILE') as f:
        data = yaml.safe_load(f)
    for name, cfg in data.get('charts', {}).items():
        print(json.dumps({'name': name, 'repo_url': cfg.get('repo_url',''), 'chart': cfg.get('chart',''), 'version': cfg.get('version',''), 'use_oci': cfg.get('use_oci', False)}))
    " | while IFS= read -r entry; do
        chart_name=$(echo "$entry" | jq -r '.name')
        repo_url=$(echo "$entry" | jq -r '.repo_url')
        chart=$(echo "$entry" | jq -r '.chart')
        current=$(echo "$entry" | jq -r '.version')
        use_oci=$(echo "$entry" | jq -r '.use_oci')

        [ -z "$current" ] && continue

        latest=""
        if [ "$use_oci" = "true" ]; then
          # OCI charts: use helm show chart
          latest=$(helm show chart "${repo_url}/${chart}" 2>/dev/null | grep '^version:' | awk '{print $2}') || true
        else
          # Traditional repos
          helm repo add "$chart_name" "$repo_url" --force-update > /dev/null 2>&1 || true
          latest=$(helm search repo "${chart_name}/${chart}" --output json 2>/dev/null | jq -r '.[0].version // empty') || true
        fi

        if [ -n "$latest" ] && [ "$current" != "$latest" ]; then
          # Strip v prefix for comparison (e.g., 0.5.25 vs v0.5.25)
          current_stripped=$(echo "$current" | sed 's/^v//')
          latest_stripped=$(echo "$latest" | sed 's/^v//')
          if [ "$current_stripped" != "$latest_stripped" ]; then
            echo "  - ${chart_name} (${chart}): ${current} -> ${latest}"
            echo "${chart_name}|${chart}|${current}|${latest}" >> "$HELM_RESULTS"
          fi
        fi
      done
    fi

    HELM_COUNT=$(wc -l < "$HELM_RESULTS" 2>/dev/null | tr -d ' ')
    [ "$HELM_COUNT" = "" ] && HELM_COUNT=0

    # =======================================================================
    # Check EKS add-on versions
    # =======================================================================
    echo ""
    echo "=== Checking EKS add-on versions ==="

    ADDON_RESULTS=$(mktemp)
    K8S_VERSION=$(python3 -c "import json; print(json.load(open('cdk.json'))['context']['kubernetes_version'])" 2>/dev/null || echo "1.35")

    # Extract addon versions from regional_stack.py
    python3 -c "
    import re
    with open('gco/stacks/regional_stack.py') as f:
        text = f.read()
    for m in re.finditer(r'addon_name=\"([^\"]+)\".*?addon_version=\"([^\"]+)\"', text, re.DOTALL):
        print(f'{m.group(1)}|{m.group(2)}')
    " | while IFS='|' read -r addon_name current_version; do
        [ -z "$addon_name" ] && continue
        latest=$(aws eks describe-addon-versions --addon-name "$addon_name" --kubernetes-version "$K8S_VERSION" \
          --query 'addons[0].addonVersions[0].addonVersion' --output text 2>/dev/null) || true

        if [ -n "$latest" ] && [ "$latest" != "None" ] && [ "$current_version" != "$latest" ]; then
          echo "  - ${addon_name}: ${current_version} -> ${latest}"
          echo "${addon_name}|${current_version}|${latest}" >> "$ADDON_RESULTS"
        fi
      done

    ADDON_COUNT=$(wc -l < "$ADDON_RESULTS" 2>/dev/null | tr -d ' ')
    [ "$ADDON_COUNT" = "" ] && ADDON_COUNT=0

    # =======================================================================
    # Check kubectl version matches EKS version
    # =======================================================================
    echo ""
    echo "=== Checking kubectl version alignment ==="

    KUBECTL_ISSUE=""
    # Get kubectl version from helm-installer Dockerfile
    KUBECTL_VER=$(grep -oP 'dl\.k8s\.io/release/v\K[\d.]+' lambda/helm-installer/Dockerfile 2>/dev/null || echo "")
    if [ -n "$KUBECTL_VER" ]; then
      # Check if kubectl minor version matches EKS version
      KUBECTL_MINOR=$(echo "$KUBECTL_VER" | cut -d. -f1-2)
      if [ "$KUBECTL_MINOR" != "$K8S_VERSION" ]; then
        echo "  ⚠ kubectl $KUBECTL_VER doesn't match EKS $K8S_VERSION"
        KUBECTL_ISSUE="kubectl ${KUBECTL_VER} vs EKS ${K8S_VERSION}"
      else
        # Check for latest patch version from dl.k8s.io
        LATEST_KUBECTL=$(curl -sL "https://dl.k8s.io/release/stable-${K8S_VERSION}.txt" 2>/dev/null | sed 's/^v//')
        if [ -n "$LATEST_KUBECTL" ] && [ "$KUBECTL_VER" != "$LATEST_KUBECTL" ]; then
          echo "  - kubectl: $KUBECTL_VER -> $LATEST_KUBECTL"
          KUBECTL_ISSUE="kubectl ${KUBECTL_VER} -> ${LATEST_KUBECTL}"
        else
          echo "  kubectl $KUBECTL_VER is up to date for EKS $K8S_VERSION"
        fi
      fi
    fi

    # =======================================================================
    # Report results
    # =======================================================================
    echo ""
    echo "=== Summary ==="
    echo "Python packages outdated: $PYTHON_COUNT"
    echo "Docker images outdated: $DOCKER_COUNT"
    echo "Helm charts outdated: $HELM_COUNT"
    echo "EKS add-ons outdated: $ADDON_COUNT"

    if [ "$PYTHON_COUNT" -eq 0 ] && [ "$DOCKER_COUNT" -eq 0 ] && [ "$HELM_COUNT" -eq 0 ] && [ "$ADDON_COUNT" -eq 0 ]; then
      echo ""
      echo "All dependencies are up to date!"
      rm -f "$DOCKER_RESULTS" "$HELM_RESULTS" "$ADDON_RESULTS"
      exit 0
    fi

    # Check if RELEASE_TOKEN is available for creating issues
    if [ -z "$RELEASE_TOKEN" ]; then
      echo ""
      echo "WARNING: RELEASE_TOKEN not set - cannot create GitLab issue"
      echo "Please update dependencies manually based on the output above"
      rm -f "$DOCKER_RESULTS" "$HELM_RESULTS" "$ADDON_RESULTS"
      exit 0
    fi

    # Build issue description
    ISSUE_TITLE="[Automated] Dependency Updates Available ($(date +%Y-%m-%d))"
    ISSUE_BODY="# Dependency Update Report\n\n"

    # Add Python section
    if [ "$PYTHON_COUNT" -gt 0 ]; then
      ISSUE_BODY+="## Python Packages\n\n"
      ISSUE_BODY+="| Package | Current | Latest |\n"
      ISSUE_BODY+="|---------|---------|--------|\n"
      while IFS= read -r line; do
        NAME=$(echo "$line" | jq -r '.name')
        CURRENT=$(echo "$line" | jq -r '.version')
        LATEST=$(echo "$line" | jq -r '.latest_version')
        ISSUE_BODY+="| $NAME | $CURRENT | $LATEST |\n"
      done < <(echo "$PYTHON_OUTDATED" | jq -c '.[]')
      ISSUE_BODY+="\n"
    fi

    # Add Docker section
    if [ "$DOCKER_COUNT" -gt 0 ]; then
      ISSUE_BODY+="## Docker Images\n\n"
      ISSUE_BODY+="| Image | Current | Latest |\n"
      ISSUE_BODY+="|-------|---------|--------|\n"
      while IFS='|' read -r img cur lat; do
        ISSUE_BODY+="| $img | $cur | $lat |\n"
      done < "$DOCKER_RESULTS"
      ISSUE_BODY+="\n"
    fi

    rm -f "$DOCKER_RESULTS"

    # Add Helm chart section
    if [ "$HELM_COUNT" -gt 0 ]; then
      ISSUE_BODY+="## Helm Charts\n\n"
      ISSUE_BODY+="| Chart | Name | Current | Latest |\n"
      ISSUE_BODY+="|-------|------|---------|--------|\n"
      while IFS='|' read -r cname chart cur lat; do
        ISSUE_BODY+="| $cname | $chart | $cur | $lat |\n"
      done < "$HELM_RESULTS"
      ISSUE_BODY+="\n"
    fi
    rm -f "$HELM_RESULTS"

    # Add EKS add-on section
    if [ "$ADDON_COUNT" -gt 0 ]; then
      ISSUE_BODY+="## EKS Add-ons\n\n"
      ISSUE_BODY+="| Add-on | Current | Latest |\n"
      ISSUE_BODY+="|--------|---------|--------|\n"
      while IFS='|' read -r addon cur lat; do
        ISSUE_BODY+="| $addon | $cur | $lat |\n"
      done < "$ADDON_RESULTS"
      ISSUE_BODY+="\n"
    fi
    rm -f "$ADDON_RESULTS"

    ISSUE_BODY+="## Action Required\n\n"
    ISSUE_BODY+="1. Review changelogs for breaking changes\n"
    ISSUE_BODY+="2. Update versions in \`pyproject.toml\` or manifests\n"
    ISSUE_BODY+="3. Run tests locally to verify compatibility\n"
    ISSUE_BODY+="4. Create a merge request with the updates\n\n"
    ISSUE_BODY+="---\n*This issue was automatically created by the CI pipeline.*"

    # Create GitLab issue via API
    echo ""
    echo "Creating GitLab issue..."

    ESCAPED_BODY=$(echo -e "$ISSUE_BODY" | jq -Rs .)

    HTTP_CODE=$(curl --silent --output /tmp/response.json --write-out "%{http_code}" \
      --request POST \
      --header "PRIVATE-TOKEN: ${RELEASE_TOKEN}" \
      --header "Content-Type: application/json" \
      --data "{\"title\": \"$ISSUE_TITLE\", \"description\": $ESCAPED_BODY, \"labels\": \"dependencies,automated\"}" \
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues")

    if [ "$HTTP_CODE" -eq 201 ]; then
      ISSUE_URL=$(jq -r '.web_url' /tmp/response.json)
      echo "Issue created successfully: $ISSUE_URL"
    else
      echo "WARNING: Failed to create issue (HTTP $HTTP_CODE)"
      echo "Response: $(cat /tmp/response.json)"
      echo ""
      echo "Please update dependencies manually based on the output above"
    fi

.dependency-scan-base:
  stage: maintenance
  image: python:3.14.4-slim
  needs: []
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y curl jq skopeo
    - pip install --upgrade pip --root-user-action=ignore
    - pip install -e ".[security]" --root-user-action=ignore
    # Install Helm pinned to the same version as lambda/helm-installer/Dockerfile
    # so the scan compares chart versions against the Helm client we actually
    # deploy with. See HELM_VERSION in the top-level variables block.
    - curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" | tar xz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/helm
    - rm -rf /tmp/linux-amd64
    - helm version --short
    # Install kubectl pinned to match the helm-installer Lambda and EKS version.
    - curl -fsSL -o /usr/local/bin/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
    - chmod +x /usr/local/bin/kubectl
    - kubectl version --client --output=yaml | head -5
    # Install AWS CLI (for EKS addon checks — fails gracefully without credentials)
    - pip install awscli --root-user-action=ignore -q
  script:
    - *dependency-scan-script

# Manual trigger — click "Play" in the pipeline UI
dependency-check:
  extends: .dependency-scan-base
  when: manual

# Scheduled monthly scan — runs on the 1st of each month at 09:00 UTC
# Setup: CI/CD → Schedules → New schedule
#   Description: "Monthly dependency scan"
#   Interval pattern: 0 9 1 * *
#   Cron timezone: UTC
#   Target branch: main
#   Variable: SCHEDULED_SCAN = "true"
dependency-scan:monthly:
  extends: .dependency-scan-base
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_SCAN == "true"'

# Weekly CVE scan — re-checks dependencies against latest vulnerability databases
# Catches newly published CVEs for packages you already depend on.
# Setup: CI/CD → Schedules → New schedule
#   Description: "Weekly security scan"
#   Interval pattern: 0 9 * * 1
#   Cron timezone: UTC
#   Target branch: main
#   Variable: SECURITY_SCAN = "true"
security-scan:weekly:
  stage: maintenance
  image: python:3.14.4-slim
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SECURITY_SCAN == "true"'
  before_script:
    - pip install --upgrade pip --root-user-action=ignore
    - pip install -e ".[security]"
    - apt-get update && apt-get install -y --no-install-recommends curl
    # Install Trivy pinned to TRIVY_VERSION to match the security:trivy job image.
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
  script:
    - echo "=== Trivy CVE scan ==="
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL --format table .
    - echo "=== Safety dependency scan ==="
    - pip-compile --no-emit-index-url --strip-extras -o /tmp/requirements-lock.txt pyproject.toml -q
    - safety check -r /tmp/requirements-lock.txt
