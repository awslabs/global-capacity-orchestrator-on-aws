# YAML Lint Configuration for GCO (Global Capacity Orchestrator on AWS)

extends: default

rules:
  line-length:
    max: 150
    level: warning

  indentation:
    spaces: 2
    indent-sequences: whatever  # Allow both styles for K8s compatibility
    check-multi-line-strings: false

  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false

  comments:
    require-starting-space: true
    ignore-shebangs: true
    min-spaces-from-content: 1

  document-start: disable
  document-end: disable

  empty-lines:
    max: 2
    max-start: 0
    max-end: 1

  key-duplicates: enable

  new-line-at-end-of-file: enable

  trailing-spaces: enable

  # Disable braces/brackets checks for K8s manifests
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore: |
  cdk.out/
  .venv/
  node_modules/
  lambda/kubectl-applier-simple-build/
  lambda/helm-installer-build/
  .mypy_cache/
  .pytest_cache/
  .ruff_cache/
  .git/
